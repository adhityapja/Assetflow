# ==========================================
# Stage 1: Build the React Frontend
# ==========================================
FROM node:18-alpine AS frontend-builder
WORKDIR /app/frontend
# Copy package files and install dependencies
COPY frontend/package.json frontend/package-lock.json* ./
RUN npm install
# Copy the rest of the frontend source code
COPY frontend/ ./
# Build the Vite React app for production
RUN npm run build
# ==========================================
# Stage 2: Build the Spring Boot Backend
# ==========================================
FROM maven:3.9.6-eclipse-temurin-17 AS backend-builder
WORKDIR /app/backend
# Copy the pom.xml and download dependencies
COPY backend/pom.xml ./
RUN mvn dependency:go-offline -B
# Copy the backend source code
COPY backend/src ./src
# Copy the frontend build output into Spring Boot's static resources directory
# This allows Spring Boot to serve the React app on the same port!
COPY --from=frontend-builder /app/frontend/dist ./src/main/resources/static
# Package the Spring Boot application (skipping tests for faster builds)
RUN mvn clean package -DskipTests
# ==========================================
# Stage 3: Production Runtime
# ==========================================
FROM eclipse-temurin:17-jre-alpine
WORKDIR /app
# Add a non-root user for security
RUN addgroup -S spring && adduser -S spring -G spring
USER spring:spring
# Copy the built jar from the backend-builder stage
COPY --from=backend-builder /app/backend/target/assetflow-0.0.1-SNAPSHOT.jar app.jar
# Expose the standard backend port
EXPOSE 8080
# Run the application
ENTRYPOINT ["java", "-jar", "app.jar"]
